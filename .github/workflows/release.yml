# =============================================================================
# Release — image publish + GitHub Release on git tag
# =============================================================================
# Triggered by a `v*` tag. Builds backend and frontend, pushes both to GHCR as
# the tag and :latest, and opens a GitHub Release with auto-generated notes
# referencing CHANGELOG.md. Images are the immutable deployment artifact the
# prod overlay pulls (see compose/docker-compose.prod.yml).
#
# Tag locally with:  git tag v0.2.0 && git push --tags
# =============================================================================
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publish images + GitHub Release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: services/backend
          - service: frontend
            context: services/frontend
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/infra-lab-${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.name }}/infra-lab-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  notes:
    name: GitHub Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Extract changelog excerpt
        id: body
        run: |
          # Pull the section matching the tag from CHANGELOG.md (Keep a Changelog).
          awk -v v="${{ github.ref_name }}" '
            /^## \[/{ s=($0 ~ "\\["v"\\]")?1:0 }
            s && /^## \[/ && $0 !~ "\\["v"\\]" { exit }
            s { print }
          ' CHANGELOG.md > release_notes.md
          test -s release_notes.md || echo "_See [CHANGELOG.md](CHANGELOG.md)._"
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
