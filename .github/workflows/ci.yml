# =============================================================================
# CI — lint + test on push and pull requests
# =============================================================================
# Fast, cheap signal that the blueprint stays shippable: shell scripts lint
# clean, compose validates for every overlay, and the backend test suite
# passes. Docker-image build lives in docker.yml; release in release.yml.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (shellcheck + compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Bootstrap environment
        run: bash ./scripts/bootstrap.sh

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install --no-audit --no-fund
        working-directory: services/backend

      - name: Lint
        run: bash ./scripts/lint.sh
  test:
    name: Test (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          # No lockfile is committed in this reference; real use should commit
          # package-lock.json and switch this to `npm ci`.
      - run: npm install --no-audit --no-fund
      - run: npm test
