# =============================================================================
# Infrastructure Lab — Prometheus configuration
# =============================================================================
# Pull model: Prometheus scrapes /metrics from each target on an interval.
# The alert_relabel/external_labels stamp this instance so a future federated
# view can tell instances apart. Rule files live in ./rules and are mounted
# read-only by the compose base.
# =============================================================================

global:
  # Literal interval (Prometheus does not interpolate env vars in its config
  # file; only Compose interpolates its own). The retention window IS
  # env-driven, set via the --storage.tsdb.retention.time CLI flag in
  # compose/docker-compose.yml (PROM_RETENTION).
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: infra-lab
    region: single-node

# --- Alerting -----------------------------------------------------------------
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# --- Recording + alerting rules (mounted at /etc/prometheus/rules) ------------
rule_files:
  - /etc/prometheus/rules/*.yml

# --- Scrape targets -----------------------------------------------------------
# All targets live on the infra-lab-net compose network; names below match
# the service names defined in compose/docker-compose.yml.
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]
        labels:
          app: infra-lab-backend

  - job_name: proxy
    metrics_path: /metrics
    static_configs:
      - targets: ["proxy:2019"]
        labels:
          app: caddy

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: infra-lab
